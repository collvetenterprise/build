version: '3.8'

services:
  ai-phone-gateway:
    build: .
    ports:
      - "8080:8080"   # HTTP API
      - "5060:5060/udp"   # SIP
      - "8081:8081"   # HTTP Proxy
      - "5353:5353/udp"   # DNS
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./logs:/usr/src/app/logs
      - ./config:/usr/src/app/config
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped
    networks:
      - phone-gateway-network

  mongodb:
    image: mongo:6
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=ai-phone-gateway
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - phone-gateway-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - phone-gateway-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-phone-gateway
    networks:
      - phone-gateway-network

volumes:
  mongodb_data:
  redis_data:

networks:
  phone-gateway-network:
    driver: bridge